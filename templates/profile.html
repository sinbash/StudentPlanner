<div class="main-content">
    <header class="top-header">
        <div style="padding:0; margin:0;">
            <h2 style="margin: 0;">Profile</h2>
        </div>
        
        <div class="header-controls">
            <div class="time-display">
                <div id="clock" style="font-weight: bold;">00:00:00</div>
                <div id="date">Loading...</div>
            </div>
            <button id="theme-switch">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="24px"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="24px"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
            </button>
        </div>
    </header>

    <div class="content">

        <!-- Profile Hero -->
        <div class="profile-hero">
            <div class="avatar-container">
                <div class="avatar" id="avatar" title="Click to change initials"></div>
            </div>
            <div class="profile-hero-info">
                <h1 id="hero-name">Student</h1>
                <p id="hero-email">Set up your profile below</p>
                <div class="joined">
                    <span class="material-symbols-outlined" style="font-size:14px;">calendar_today</span>
                    Joined <span id="hero-joined"></span>
                </div>
            </div>
        </div>

        <!-- Quick stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-units">0</div>
                <div class="stat-label">Units Tracked</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">0</div>
                <div class="stat-label">Tasks Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-deadlines">0</div>
                <div class="stat-label">Deadlines Set</div>
            </div>
        </div>

        <!-- Personal Information -->
        <div class="card">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">
                    <path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Z"/>
                </svg>
                Personal Information
            </h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" class="form-input" placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" class="form-input" placeholder="Enter last name">
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmail" class="form-input" placeholder="you@university.edu">
                </div>
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" class="form-input" placeholder="e.g. 12345678">
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" class="form-input">
                </div>
                <div class="form-group">
                    <label for="university">University</label>
                    <input type="text" id="university" class="form-input" placeholder="e.g. UWA">
                </div>
                <div class="form-group full-width">
                    <label for="bio">Bio</label>
                    <textarea id="bio" class="form-input" placeholder="A short bio about yourself..."></textarea>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
                <button class="btn-secondary" onclick="resetProfile()">Discard</button>
            </div>
        </div>

        <!-- Academic Preferences -->
        <div class="card">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">
                    <path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Z"/>
                </svg>
                Academic Preferences
            </h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="degree">Degree</label>
                    <input type="text" id="degree" class="form-input" placeholder="e.g. BSc Computer Science">
                </div>
                <div class="form-group">
                    <label for="year">Year of Study</label>
                    <select id="year" class="form-input">
                        <option value="">Select year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                        <option value="5">5th Year+</option>
                        <option value="pg">Postgraduate</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="semester">Current Semester</label>
                    <select id="semester" class="form-input">
                        <option value="">Select semester</option>
                        <option value="sem1">Semester 1</option>
                        <option value="sem2">Semester 2</option>
                        <option value="summer">Summer</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="timezone">Timezone</label>
                    <select id="timezone" class="form-input"></select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>

    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
