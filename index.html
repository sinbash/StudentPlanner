<!DOCTYPE html>
<html>
    <head>
        <title>Student Plannar</title>
        <style>
            body{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                display: flex;
                min-height: 100vh; /*Makes background fill the whole screen */
                background-color: #f4f4f4;

            }
            .dashboard-welcome {font-size: 1.8rem; font-weight: 500; margin-top: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e0e0e0; color: #444;}

            .section-divider {border: none; border-top: 1px solid #e0e0e0; margin: 15px 0 20px 0;}

            /* Side Bar */

            .sidebar {
                width: 220px;
                background-color: #5c94e4;
                color: white;
                padding: 25px 15px;
                display: flex;
                flex-direction: column;
                gap: 10px
            }

            .sidebar h2 {
                font-size: 1.1rem;
                margin-bottom: 20px;
                border-bottom: 1px solid #646464;
                padding-bottom: 10px;
                height: 20px;

            }

            .sidebar a {
                color: white;
                text-decoration: none;
                padding: 12px;
                border-radius: 6px;
                font-size: 2 rem;
                transition: 0.2s;
            }

            .sidebar a:hover { background-color: #1557b0;}
            
            .main-content {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .top-header {
                background: white;
                padding: 15px 30px;
                border-bottom: 1px solid #e0e0e0;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                height: 40px;
            }

            .logo-area {
                display: flex;
                flex-direction: column;

            }

            .logo-title {
                font-size: 2rem;
                font-weight: bold;
                color: white;
            }

            .welcome-msg {
                font-size: 1rem;
                color: white;
                margin-top: 2px;
            }

            .header {
                background: white;
                padding: 25px 15px;
                border-bottom: 1px solid #e0e0e0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .time-display {
                text-align: right;
                color: black;
                font-size: 0.9rem;
            }

            .content {
                padding: 40px;
            }

            table {
                border-collapse: collapse;
                border-radius: 5px;
                overflow: hidden;
                width: 100%;
            }

            th {
                background: grey;
                padding: 15px;
                text-align: left;
                color: black;
            }

            td {
                padding: 12px;
                border-bottom: 1px solid #eee;
            }

            .input-field {
                width: 60%;
                padding: 8px;
                border: 1px;
                border-radius: 4px;
            }

            .btn-add {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            }

        .btn-delete {
            color: #d93025;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            }

        .status-dropdown {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        } 

        .status-not-started {
            background-color: #ffdce0; 
            color: #d93025;
        }

        .status-in-progress {
            background-color: #fff4cc; 
            color: #b05e00;
        }

        .status-completed {
            background-color: #e6f4ea; 
            color: #1e8e3e;
        }

        .semester-container {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .semester-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #333;
        }

        .progress-bar-bg {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 50px;
            height: 12px;
            overflow: hidden; /* Ensures the fill stays inside the rounded corners */
        }

        .progress-bar-fill {
            width: 42%; /* Update this value as the semester goes on! */
            height: 100%;
            background: linear-gradient(90deg, #4A90E2 0%, #357ABD 100%);
            border-radius: 50px;
            transition: width 0.5s ease-in-out; /* Makes the bar "grow" smoothly when the page loads */
        }

        .week-text { font-size: 0.95rem; }
        .percent-text { font-size: 0.9rem; color: #666; font-weight: 600; }

        </style>
    </head>

    <body>
        <nav class="sidebar"> 
            <h2>Student Planner</h2>
            <p class="welcome-msg">Welcome Back, <span id="display-name">User</span>!</p>
            <a href="#">My Units</a>
            <a href="#">Assignments</a>
            <a href="#">Deadlines</a>
            <a href="#">Reminders</a>
            <a href="#">Grades</a>
            <a href="#">Invite a Friend</a>
        </nav>


        <div class="main-content">
            <header class="top-header">
                <div class="spacer"></div>
                <div class="time-display">
                    <div id="clock" style="font-weight: bold;">00:00:00</div>
                <div id="date">Loading...</div>
            </header>

        <div class="setup-container" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
            <label>Start: <input type="date" id="start-input"></label>
            <label>End: <input type="date" id="end-input"></label>
            <button onclick="saveDates()" style="background: #4A90E2; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Update Semester</button>
        </div>

        <div class="semester-container">
            <div class="semester-header">
                <span class="week-text">Semester Progress: <strong id="current-week">Set your dates above</strong></span>
                <span class="percent-text" id="percent-complete">0% Complete</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
            </div>
        </div>

        <main class="content">
            <h2 style="margin-top: 0;">Deadlines</h2>
            
            <table>
                <thead>
                    <tr>
                        <th>Unit Code</th>
                        <th>Due Date</th>
                        <th>Assignments</th>
                        <th>Count Down</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="unit-body">
                    <tr>
                        <td><input type="text" class="input-field" placeholder="Unit Code"></td>
                        <td><input type="date" class="input-field" onchange="calculateCountdown(this)"></td>
                        <td><input type="text" class="input-field" placeholder="Assignments"></td>
                        <td style="text-align: center; font-size: 1.1rem;">-</td>
                        <td>
                            <select class="status-dropdown status-not-started" onchange="updateStatusColour(this)">
                                <option value="not-started">Not started</option>
                                <option value="in-progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </td>
                        <td><button class="btn-delete" onclick="removeRow(this)">&times;</button></td>
                    </tr>
                </tbody>
            </table>

            <button class="btn-add" onclick="addNewRow()">+ Add New Assignment</button>
        </main>
    </div>

    <script>
        // 1. Clock and Date logic
        function startClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
        }
        setInterval(startClock, 1000);
        startClock();

        // 2. Add Status Colour
        function updateStatusColour(selectElement) {
            selectElement.classList.remove('status-not-started', 'status-in-progress', 'status-completed');

            const status = selectElement.value;
            if (status == "not-started") {
                selectElement.classList.add('status-not-started');
            } else if (status == "in-progress") {
                selectElement.classList.add('status-in-progress');
            } else if (status == "completed") {
                selectElement.classList.add('status-completed')
            }
        }

        // 3. Add Row 
        function addNewRow() {
            const tableBody = document.getElementById('unit-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="input-field" placeholder="Unit Code"></td>
                <td><input type="date" class="input-field" onchange="calculateCountdown(this)"></td>
                <td><input type="text" class="input-field" placeholder="Assignments"></td>
                <td style="text-align: center; font-size: 1.1rem;">-</td>
                <td>
                    <select class="status-dropdown status-not-started" onchange="updateStatusColour(this)">
                        <option value="not-started" selected>Not Started</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </td>
                <td><button class="btn-delete" onclick="removeRow(this)">&times;</button></td>
            `;
            tableBody.appendChild(row);
        }

        // 4. Delete Row 
        function removeRow(button) {
            button.closest('tr').remove();
        }

        
        // 5. Load dates from storage when the page opens
        window.onload = function() {
            const savedStart = localStorage.getItem('semStart');
            const savedEnd = localStorage.getItem('semEnd');
            
            if (savedStart && savedEnd) {
                document.getElementById('start-input').value = savedStart;
                document.getElementById('end-input').value = savedEnd;
                calculateProgress(savedStart, savedEnd);
            }
        };
        
        // 6. Save the Dates for Semester Progress
        function saveDates() {
            const start = document.getElementById('start-input').value;
            const end = document.getElementById('end-input').value;

            if (start && end) {
                localStorage.setItem('semStart', start);
                localStorage.setItem('semEnd', end);
                calculateProgress(start, end);
            } else {
                alert("Please select both start and end dates!");
            }
        }

    
        // 7. Semester Progress
        function calculateProgress(startStr, endStr) {
            const startDate = new Date(startStr);
            const endDate = new Date(endStr);
            const today = new Date();

            const totalDuration = endDate - startDate;
            const elapsed = today - startDate;

            // Percentage Logic
            let percentage = Math.floor((elapsed / totalDuration) * 100);
            percentage = Math.min(Math.max(percentage, 0), 100);

            // Week Logic
            const diffInDays = Math.floor(elapsed / (1000 * 60 * 60 * 24));
            const currentWeek = Math.ceil((diffInDays + 1) / 7);
            const totalWeeks = Math.ceil(totalDuration / (1000 * 60 * 60 * 24 * 7));

            // Update UI
            document.getElementById('progress-fill').style.width = percentage + "%";
            document.getElementById('percent-complete').innerText = percentage + "% Complete";
            
            if (percentage >= 100) {
                document.getElementById('current-week').innerText = "Semester Finished!";
            } else if (percentage <= 0) {
                document.getElementById('current-week').innerText = "Not started yet";
            } else {
                document.getElementById('current-week').innerText = `Week ${currentWeek} of ${totalWeeks}`;
            }
        }

        // 8. Count down (in days)

        function calculateCountdown(dateInput) {
            const selectedDate = new Date(dateInput.value);
            const today = new Date();
            
            // Normalize both dates to midnight to ensure accurate day-by-day subtraction
            today.setHours(0, 0, 0, 0);
            selectedDate.setHours(0, 0, 0, 0);

            // Calculate the difference in milliseconds and convert to days
            const diffTime = selectedDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // Find the cell in the "Count Down" column for this specific row
            const row = dateInput.closest('tr');
            const countdownCell = row.cells[3]; // The 4th column (index 3)

            if (isNaN(diffDays)) {
                countdownCell.innerText = "-";
            } else {
                countdownCell.innerText = diffDays;
                
            }
        }

        

    </script>
</body>
</html>
