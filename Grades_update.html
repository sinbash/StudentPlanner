<!DOCTYPE html>
<html>
<head>
  <title>Student Planner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      display: flex;
      min-height: 100vh;
      background-color: #f4f4f4;
    }

    .dashboard-welcome {
      font-size: 1.8rem; font-weight: 500;
      margin-top: 10px; margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
      color: #444;
    }

    .section-divider { border: none; border-top: 1px solid #e0e0e0; margin: 15px 0 20px 0; }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      background: linear-gradient(180deg, #5c94e4, #3b6fd8);
      border-top-right-radius: 20px;
      border-bottom-right-radius: 20px;
      color: white;
      padding: 25px 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidebar h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      border-bottom: 1px solid #646464;
      padding-bottom: 10px;
      height: 20px;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 1rem;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .sidebar a:hover { background-color: rgba(255,255,255,0.15); }
    .sidebar a.active { background-color: rgba(255,255,255,0.25); }

    /* ── Main layout ── */
    .main-content { flex: 1; display: flex; flex-direction: column; }

    .top-header {
      background: white;
      padding: 15px 30px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      height: 40px;
    }
    .time-display { text-align: right; color: black; font-size: 0.9rem; }

    .content { padding: 40px; }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-top: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .card h2 { margin-top: 0; color: #333; }

    /* ── WAM summary bar ── */
    .wam-bar {
      display: flex;
      align-items: center;
      gap: 30px;
      background: linear-gradient(135deg, #5c94e4, #3b6fd8);
      color: white;
      border-radius: 10px;
      padding: 18px 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .wam-stat { display: flex; flex-direction: column; gap: 2px; }
    .wam-stat .wam-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
    .wam-stat .wam-value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .wam-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.3); }

    /* ── Add unit row ── */
    .add-unit-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .add-unit-row input, .add-unit-row select {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: 0.2s;
      outline: none;
    }
    .add-unit-row input { flex: 1; min-width: 180px; }
    .add-unit-row input:focus, .add-unit-row select:focus { border-color: #5c94e4; box-shadow: 0 0 0 2px rgba(92,148,228,0.2); }

    .btn-add {
      padding: 10px 20px;
      background: linear-gradient(135deg, #5c94e4, #3b6fd8);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      font-size: 0.95rem;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }

    /* ── Unit card ── */
    .unit-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
      background: white;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:none; } }

    .unit-header {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      background: #f8f9fb;
      border-bottom: 1px solid #e0e0e0;
    }
    .unit-header:hover { background: #eef2fb; }

    .unit-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .unit-header-name { flex: 1; font-weight: 600; color: #333; font-size: 1rem; }

    .unit-header-right { display: flex; align-items: center; gap: 12px; }

    .grade-badge {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      background: #f1f3f6;
      color: #888;
    }
    .grade-badge.hd { background: #d4f5e2; color: #1a7a45; }
    .grade-badge.d  { background: #d4eeff; color: #1a5fa0; }
    .grade-badge.cr { background: #fff3cd; color: #9a6500; }
    .grade-badge.p  { background: #ffe5cc; color: #a04a00; }
    .grade-badge.n  { background: #fde0e0; color: #b00020; }

    .unit-cp { font-size: 0.78rem; color: #999; }
    .chevron { color: #aaa; font-size: 0.75rem; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .unit-body { padding: 18px; display: none; }
    .unit-body.open { display: block; }

    /* Weight progress bar */
    .weight-bar-wrap { margin-bottom: 16px; }
    .weight-bar-meta {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: #888; margin-bottom: 5px;
    }
    .weight-bar-meta span:last-child { color: #5c94e4; font-weight: 600; }
    .weight-bar-track { height: 6px; background: #eee; border-radius: 99px; overflow: hidden; }
    .weight-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #5c94e4, #3b6fd8);
      transition: width 0.3s ease;
    }

    /* Assessments table */
    .asm-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .asm-table th {
      text-align: left; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: #999; padding: 0 10px 8px; font-weight: 600;
    }
    .asm-table td { padding: 4px 10px; }
    .asm-table tr:hover td { background: #f8f9fb; }
    .asm-table tr td:first-child { border-radius: 6px 0 0 6px; }
    .asm-table tr td:last-child  { border-radius: 0 6px 6px 0; }

    .tbl-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #ddd;
      font-family: inherit;
      font-size: 0.9rem;
      color: #333;
      padding: 4px 0;
      outline: none;
      transition: border-color 0.15s;
    }
    .tbl-input:focus { border-color: #5c94e4; }
    .tbl-input::placeholder { color: #bbb; font-size: 0.8rem; }

    .contrib-cell { font-size: 0.82rem; color: #bbb; text-align: right; }
    .contrib-cell.has-val { color: #2a9a5e; font-weight: 600; }

    .btn-add-asm {
      font-size: 0.82rem;
      padding: 7px 14px;
      border: 1px dashed #ccc;
      background: transparent;
      border-radius: 6px;
      color: #999;
      cursor: pointer;
      font-family: inherit;
      transition: 0.15s;
      margin-bottom: 14px;
    }
    .btn-add-asm:hover { border-color: #5c94e4; color: #5c94e4; }

    /* Target row */
    .target-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8f9fb;
      border-radius: 8px;
      padding: 10px 14px;
      flex-wrap: wrap;
    }
    .target-row label { font-size: 0.8rem; color: #888; font-weight: 500; white-space: nowrap; }
    .target-row select {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      background: white;
      outline: none;
      cursor: pointer;
    }
    .target-info { font-size: 0.82rem; color: #555; margin-left: auto; }
    .target-info.good { color: #1a7a45; font-weight: 600; }
    .target-info.bad  { color: #b00020; font-weight: 600; }

    .unit-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid #eee;
    }
    .btn-delete-unit {
      background: none;
      border: 1px solid #eee;
      border-radius: 6px;
      color: #d93025;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 6px 14px;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-delete-unit:hover { background: #fde0e0; border-color: #d93025; }

    .btn-delete-asm {
      background: none; border: none;
      color: #d93025; font-size: 1rem;
      cursor: pointer; padding: 0 4px;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 50px 20px; color: #aaa;
    }
    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<nav class="sidebar">
  <h2>Student Planner</h2>
  <a href="index.html">🏠 Dashboard</a>
  <a href="Units.html">📚 My Units</a>
  <a href="PersonalToDoList.html">✅ Personal To-Do List</a>
  <a href="Grades.html" class="active">📊 Grades</a>
  <a href="Settings.html">⚙️ Settings</a>
  <a href="#">👥 Invite a Friend</a>
</nav>

<div class="main-content">
  <header class="top-header">
    <div class="time-display">
      <div id="clock" style="font-weight:bold;">00:00:00</div>
      <div id="date">Loading...</div>
    </div>
  </header>

  <main class="content">
    <p class="dashboard-welcome">📊 Grades</p>
    <hr class="section-divider">

    <!-- WAM summary -->
    <div class="wam-bar">
      <div class="wam-stat">
        <span class="wam-label">Overall WAM</span>
        <span class="wam-value" id="overall-wam">—</span>
      </div>
      <div class="wam-divider"></div>
      <div class="wam-stat">
        <span class="wam-label">Units Tracked</span>
        <span class="wam-value" id="unit-count">0</span>
      </div>
      <div class="wam-divider"></div>
      <div class="wam-stat">
        <span class="wam-label">Grade</span>
        <span class="wam-value" id="overall-grade">—</span>
      </div>
    </div>

    <!-- Add unit -->
    <div class="card">
      <h2 style="margin-bottom:18px;">My Units</h2>

      <div class="add-unit-row">
        <input type="text" id="unit-name-input" placeholder="Unit name or code (e.g. CITS3403)" />
        <select id="unit-cp-select">
          <option value="6">6 credit points</option>
          <option value="12">12 credit points</option>
          <option value="3">3 credit points</option>
        </select>
        <button class="btn-add" onclick="addUnit()">+ Add Unit</button>
      </div>

      <div id="units-container">
        <div class="empty-state">
          <div class="emoji">📚</div>
          <p>No units added yet. Add a unit above to start tracking!</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const COLORS = ['#5c94e4','#e4855c','#5ce48e','#e4c85c','#a05ce4','#5cd4e4','#e45c9e','#8ee45c'];
  let units = [];
  let colorIdx = 0;

  // ── Persist ──────────────────────────────────────────────────────
  function save() {
    try { localStorage.setItem('sp-grades-v1', JSON.stringify(units)); } catch(e) {}
  }
  function load() {
    try {
      const d = localStorage.getItem('sp-grades-v1');
      if (d) { units = JSON.parse(d); colorIdx = units.length % COLORS.length; }
    } catch(e) {}
    render();
  }

  // ── Clock ─────────────────────────────────────────────────────────
  function startClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString();
    document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
  }
  setInterval(startClock, 1000);
  startClock();

  // ── Unit management ───────────────────────────────────────────────
  function addUnit() {
    const inp = document.getElementById('unit-name-input');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const cp = parseInt(document.getElementById('unit-cp-select').value);
    units.push({ id: Date.now(), name, cp, color: COLORS[colorIdx % COLORS.length], open: true, target: 75, assessments: [] });
    colorIdx++;
    inp.value = '';
    save();
    render();
  }

  document.getElementById('unit-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addUnit();
  });

  function deleteUnit(id) {
    if (!confirm('Remove this unit?')) return;
    units = units.filter(u => u.id !== id);
    save();
    render();
  }

  function toggleUnit(id) {
    const u = units.find(u => u.id === id);
    if (u) { u.open = !u.open; render(); }
  }

  // ── Assessment management ─────────────────────────────────────────
  function addAssessment(unitId) {
    const u = units.find(u => u.id === unitId);
    if (!u) return;
    u.assessments.push({ id: Date.now(), name: '', weight: '', grade: '' });
    save();
    render();
    setTimeout(() => {
      const inputs = document.querySelectorAll(`[data-unit="${unitId}"] .asm-name`);
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 30);
  }

  function deleteAssessment(unitId, asmId) {
    const u = units.find(u => u.id === unitId);
    if (!u) return;
    u.assessments = u.assessments.filter(a => a.id !== asmId);
    save();
    render();
  }

  function updateAssessment(unitId, asmId, field, value) {
    const u = units.find(u => u.id === unitId);
    if (!u) return;
    const a = u.assessments.find(a => a.id === asmId);
    if (!a) return;
    a[field] = value;
    save();
    refreshUnit(unitId);
  }

  function updateTarget(unitId, value) {
    const u = units.find(u => u.id === unitId);
    if (u) { u.target = parseFloat(value); save(); refreshUnit(unitId); }
  }

  // ── Calculations ──────────────────────────────────────────────────
  function calcUnit(u) {
    let weightedSum = 0, totalWeight = 0;
    for (const a of u.assessments) {
      const w = parseFloat(a.weight), g = parseFloat(a.grade);
      if (!isNaN(w) && w > 0) {
        totalWeight += w;
        if (!isNaN(g)) weightedSum += (g / 100) * w;
      }
    }
    const remaining = Math.max(0, 100 - totalWeight);
    const current = totalWeight > 0 ? (weightedSum / totalWeight) * 100 : null;
    return { weightedSum, totalWeight, remaining, current };
  }

  function gradeClass(v) {
    if (v === null) return '';
    if (v >= 85) return 'hd';
    if (v >= 75) return 'd';
    if (v >= 65) return 'cr';
    if (v >= 50) return 'p';
    return 'n';
  }

  function gradeLabel(v) {
    if (v === null) return '—';
    if (v >= 85) return 'HD';
    if (v >= 75) return 'D';
    if (v >= 65) return 'CR';
    if (v >= 50) return 'P';
    return 'N';
  }

  function overallWAM() {
    let totalCP = 0, sum = 0;
    for (const u of units) {
      const { current } = calcUnit(u);
      if (current !== null) { sum += current * u.cp; totalCP += u.cp; }
    }
    return totalCP > 0 ? sum / totalCP : null;
  }

  // ── Render ────────────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('units-container');

    if (!units.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">📚</div><p>No units added yet. Add a unit above to start tracking!</p></div>`;
    } else {
      container.innerHTML = units.map(unitHTML).join('');
      attachListeners(container);
    }

    updateSummary();
  }

  function unitHTML(u) {
    const { weightedSum, totalWeight, remaining, current } = calcUnit(u);
    const gc = gradeClass(current);
    const pct = current !== null ? current.toFixed(1) + '%' : '—';
    const gl = gradeLabel(current);

    let targetHTML = '';
    if (remaining > 0 && totalWeight > 0) {
      const needed = ((u.target - weightedSum) / remaining) * 100;
      if (needed <= 0) targetHTML = `<span class="target-info good">Already on track ✓</span>`;
      else if (needed > 100) targetHTML = `<span class="target-info bad">Not achievable (need ${needed.toFixed(0)}%)</span>`;
      else targetHTML = `<span class="target-info">Need <strong>${needed.toFixed(1)}%</strong> avg on remaining ${remaining.toFixed(0)}%</span>`;
    } else if (!totalWeight) {
      targetHTML = `<span class="target-info">Add assessments to see</span>`;
    } else {
      targetHTML = `<span class="target-info good">All assessments entered</span>`;
    }

    const rows = u.assessments.map(a => {
      const w = parseFloat(a.weight), g = parseFloat(a.grade);
      const contrib = (!isNaN(w) && !isNaN(g) && w > 0) ? ((g / 100) * w).toFixed(1) : null;
      return `<tr>
        <td><input class="tbl-input asm-name" data-field="name" data-unitid="${u.id}" data-asmid="${a.id}" placeholder="Assessment name" value="${esc(a.name)}" /></td>
        <td style="width:100px"><input class="tbl-input" data-field="weight" data-unitid="${u.id}" data-asmid="${a.id}" placeholder="%" type="number" min="0" max="100" value="${esc(a.weight)}" /></td>
        <td style="width:100px"><input class="tbl-input" data-field="grade"  data-unitid="${u.id}" data-asmid="${a.id}" placeholder="%" type="number" min="0" max="100" value="${esc(a.grade)}" /></td>
        <td class="contrib-cell ${contrib !== null ? 'has-val' : ''}" style="width:70px">${contrib !== null ? contrib + '%' : '—'}</td>
        <td style="width:36px"><button class="btn-delete-asm" onclick="deleteAssessment(${u.id},${a.id})">✕</button></td>
      </tr>`;
    }).join('');

    return `
    <div class="unit-card" data-unit="${u.id}">
      <div class="unit-header" onclick="toggleUnit(${u.id})">
        <div class="unit-color-dot" style="background:${u.color}"></div>
        <span class="unit-header-name">${esc(u.name)}</span>
        <div class="unit-header-right">
          <span class="unit-cp">${u.cp} cp</span>
          <span class="grade-badge ${gc}">${pct} &nbsp; ${gl}</span>
        </div>
        <span class="chevron ${u.open ? 'open' : ''}">▼</span>
      </div>
      <div class="unit-body ${u.open ? 'open' : ''}">

        <div class="weight-bar-wrap">
          <div class="weight-bar-meta">
            <span>Weight entered: ${totalWeight.toFixed(0)}%</span>
            <span>${remaining.toFixed(0)}% remaining</span>
          </div>
          <div class="weight-bar-track">
            <div class="weight-bar-fill" style="width:${Math.min(totalWeight,100)}%"></div>
          </div>
        </div>

        <table class="asm-table">
          <thead>
            <tr>
              <th>Assessment</th>
              <th>Weight %</th>
              <th>Grade %</th>
              <th style="text-align:right">Contribution</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>

        <button class="btn-add-asm" onclick="addAssessment(${u.id})">+ Add assessment</button>

        <div class="target-row">
          <label>Target grade:</label>
          <select onchange="updateTarget(${u.id}, this.value)">
            <option value="85" ${u.target===85?'selected':''}>HD — 85%</option>
            <option value="75" ${u.target===75?'selected':''}>D — 75%</option>
            <option value="65" ${u.target===65?'selected':''}>CR — 65%</option>
            <option value="50" ${u.target===50?'selected':''}>P — 50%</option>
          </select>
          ${targetHTML}
        </div>

        <div class="unit-footer">
          <button class="btn-delete-unit" onclick="deleteUnit(${u.id})">Remove unit</button>
        </div>
      </div>
    </div>`;
  }

  function attachListeners(container) {
    container.querySelectorAll('[data-field]').forEach(el => {
      el.addEventListener('input', () => {
        updateAssessment(parseInt(el.dataset.unitid), parseInt(el.dataset.asmid), el.dataset.field, el.value);
      });
    });
  }

  function refreshUnit(unitId) {
    const u = units.find(u => u.id === unitId);
    if (!u) return;
    const card = document.querySelector(`[data-unit="${unitId}"]`);
    if (!card) return;
    const tmp = document.createElement('div');
    tmp.innerHTML = unitHTML(u);
    const newCard = tmp.firstElementChild;
    attachListeners(newCard);
    card.replaceWith(newCard);
    updateSummary();
  }

  function updateSummary() {
    const wam = overallWAM();
    document.getElementById('overall-wam').textContent = wam !== null ? wam.toFixed(1) + '%' : '—';
    document.getElementById('overall-grade').textContent = gradeLabel(wam);
    document.getElementById('unit-count').textContent = units.length;
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
</script>
</body>
</html>
