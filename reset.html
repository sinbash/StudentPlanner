
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Planner - Login </title>

        <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

        <div class="container d-flex justify-content-center align-items-center min-vh-100 "> 
        <!-- Card container with padding, shadow, rounded corners -->
        <div class="p-4 shadow rounded custom-bg" style="width: 350px;"> 

            <div class="text-center mb-3">
            <!--<p>Hey students! <b>Planning</b> never gets easier</p> , need a good phrase-->  
                <h4>Reset Password
                </h4>
            </div>

            <form action="Rest your password" method="post">
                <!-- Email input field -->
                <div class="mb-3"> 
                    <label class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="username or email" required>
                </div>
                <!-- Password input field -->
                <div class="mb-3">
                    <label class="form-label"> New Password</label>
                    <input type="password" id="password"  name="password" class="form-control" placeholder="password" required>
                </div>
                <!-- Submit button   -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Reset</button>
                </div>
                
                <!-- Navigation links for account actions -->
                <div class="text-center">
                    <a href="login.html" class="me-3">Log in </a>
                    <a href="reset.html" class="me-3" >Forgot password</a>
                </div>

            </form>

        </div>
    </div>



    
    
</body>
</html>
