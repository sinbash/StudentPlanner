<!DOCTYPE html>
<html>
<head>
    <title>Student Planner - Grades</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>

        :root {
            --background-color: #f4f7fe;
            --card-bg: #ffffff;
            --sidebar: #005fe3;
            --sidebar-gradient: #1e428b;
            --text-color: #2d3748;

            /* Status Colors */
            --red-button: #e53e3e;
            --yellow-button: #d69e2e;
            --green-button: #38a169;
            --red-background: #fff5f5;
            --yellow-background: #fffff0;
            --green-background: #f0fff4;
        }

        /* DARKMODE */
        .darkmode {
            --background-color: #0f172a;
            --card-bg: #1e293b;
            --sidebar: #000d37;
            --sidebar-gradient: #1e3a8a;
            --text-color: #f1f5f9;

        /* Vibrant Status for Dark Mode */
            --red-button: #ff8080;
            --yellow-button: #f6e05e;
            --green-button: #68d391;
            --red-background: rgba(255, 128, 128, 0.1);
            --yellow-background: rgba(246, 224, 94, 0.1);
            --green-background: rgba(104, 211, 145, 0.1);
        }

        #theme-switch {
            order: 1;
            height: 40px;
            width: 40px;
            padding: 0;
            border-radius: 50%;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
        }

        #theme-switch svg { 
            position: absolute; 
            fill: var(--text-color); }

        /* Hide sun by default, show moon */
        .moon-icon { opacity: 1; transform: scale(1); }
        .sun-icon  { opacity: 0; transform: scale(0.5); }

        /* In darkmode, swap them */
        .darkmode .moon-icon { opacity: 0; transform: scale(0.5); }
        .darkmode .sun-icon  { opacity: 1; transform: scale(1); fill: #f6e05e; }

        /* Body */

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            background-color: var(--background-color);
        }

        .section-divider {
            border: none; 
            border-top: 1px solid var(--base-color); 
            margin: 15px 0 20px 0;}

        .sidebar {
            width: 200px;
            background: linear-gradient(180deg, var(--sidebar), var(--sidebar-gradient));
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 10px;
            height: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .sidebar a:hover { background-color: rgba(255,255,255,0.1); }

        /* Page format */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            background: var(--background-color);
            padding: 15px 30px;
            border-bottom: 1px solid var(--background-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        h1, h2, h3 { color: var(--text-color); }

        /*Time*/
        .time-display {
            text-align: right;
            color: var(--text-color);
            font-size: 0.9rem;
            margin: 0;
            line-height: 1.2;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }


        /*Table Format*/

        .content {
            padding: 10px;
            margin-top: 10px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 0;
        }

        th {
            background: var(--background-color);
            padding: 16px;
            text-align: left;
            color: var(--text-color);
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--background-color);
            background-color: transparent;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--text-color);
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: 300;
        }

        .input-field:focus {
            color: var(--sidebar); 
            outline: none ; 
            box-shadow: 0 0 0 2px var(--text-color);
        }

        .btn-add {
            margin-top: 20px;
            padding: 12px 20px;
            background: var(--sidebar-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-delete {
            color: var(--red-button);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }


        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }


        /* ── WAM summary bar ── */
        .wam-bar {
            display: flex;
            align-items: center;
            gap: 30px;
            background: linear-gradient(135deg, var(--sidebar), var(--sidebar-gradient));
            color: white;
            border-radius: 12px;
            margin: 15px 0;
            padding: 15px 20px;
            flex-wrap: wrap;
        }
        .wam-stat { display: flex; flex-direction: column; gap: 2px; }
        .wam-stat .wam-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
        .wam-stat .wam-value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .wam-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.3); }

        /* ── Add unit row ── */
        .add-unit-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* ── Unit card ── */
        .unit-card {
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px;
            margin-bottom: 16px;
            overflow: hidden;
            background: var(--card-bg);
            animation: fadeIn 0.2s ease;
        }
        .darkmode .unit-card { border-color: rgba(255,255,255,0.08); }

        @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:none; } }

        .unit-header {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            background: var(--background-color);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .darkmode .unit-header { border-bottom-color: rgba(255,255,255,0.05); }
        .unit-header:hover { filter: brightness(0.97); }
        .darkmode .unit-header:hover { filter: brightness(1.05); }

        .unit-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .unit-header-name { flex: 1; font-weight: 600; color: var(--text-color); font-size: 1rem; }
        .unit-header-right { display: flex; align-items: center; gap: 12px; }

        .grade-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 100px;
            background: var(--background-color);
            color: var(--text-color);
            opacity: 0.7;
        }
        .grade-badge.hd { background: var(--green-background); color: var(--green-button); opacity: 1; }
        .grade-badge.d  { background: rgba(0,95,227,0.1); color: var(--sidebar); opacity: 1; }
        .grade-badge.cr { background: var(--yellow-background); color: var(--yellow-button); opacity: 1; }
        .grade-badge.p  { background: rgba(221,107,32,0.1); color: #dd6b20; opacity: 1; }
        .darkmode .grade-badge.p { color: #f6ad55; }
        .grade-badge.n  { background: var(--red-background); color: var(--red-button); opacity: 1; }

        .unit-cp { font-size: 0.78rem; color: var(--text-color); opacity: 0.5; }
        .chevron { color: var(--text-color); opacity: 0.4; font-size: 0.75rem; transition: transform 0.2s; }
        .chevron.open { transform: rotate(180deg); }

        .unit-body { padding: 18px; display: none; }
        .unit-body.open { display: block; }

        /* ── Weight progress bar ── */
        .weight-bar-wrap { margin-bottom: 16px; }
        .weight-bar-meta {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--text-color); opacity: 0.6; margin-bottom: 5px;
        }
        .weight-bar-meta span:last-child { color: var(--sidebar); font-weight: 600; opacity: 1; }
        .weight-bar-track { height: 6px; background: var(--background-color); border-radius: 99px; overflow: hidden; }
        .weight-bar-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, var(--sidebar-gradient) 0%, var(--sidebar) 100%);
            transition: width 0.3s ease;
        }

        /* ── Assessments table ── */
        .asm-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .asm-table th {
            text-align: left; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--text-color); opacity: 0.5;
            padding: 0 10px 8px; font-weight: 600;
        }
        .asm-table td { padding: 4px 10px; }
        .asm-table tr:hover td { background: var(--background-color); }
        .asm-table tr td:first-child { border-radius: 6px 0 0 6px; }
        .asm-table tr td:last-child  { border-radius: 0 6px 6px 0; }

        .tbl-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(128,128,128,0.3);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-color);
            padding: 4px 0;
            outline: none;
            transition: border-color 0.15s;
        }
        .tbl-input:focus { border-color: var(--sidebar); }
        .tbl-input::placeholder { color: var(--text-color); opacity: 0.35; font-size: 0.8rem; }

        .contrib-cell { font-size: 0.82rem; color: var(--text-color); opacity: 0.35; text-align: right; }
        .contrib-cell.has-val { color: var(--green-button); opacity: 1; font-weight: 600; }

        .btn-add-asm {
            font-size: 0.82rem;
            padding: 7px 14px;
            border: 1px dashed rgba(128,128,128,0.3);
            background: transparent;
            border-radius: 6px;
            color: var(--text-color);
            opacity: 0.6;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
            margin-bottom: 14px;
        }
        .btn-add-asm:hover { border-color: var(--sidebar); color: var(--sidebar); opacity: 1; }

        /* ── Target row ── */
        .target-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--background-color);
            border-radius: 8px;
            padding: 10px 14px;
            flex-wrap: wrap;
        }
        .target-row label { font-size: 0.8rem; color: var(--text-color); opacity: 0.6; font-weight: 500; white-space: nowrap; }
        .target-row select {
            border: 1px solid rgba(128,128,128,0.3);
            border-radius: 6px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            cursor: pointer;
        }
        .target-info { font-size: 0.82rem; color: var(--text-color); opacity: 0.7; margin-left: auto; }
        .target-info.good { color: var(--green-button); font-weight: 600; opacity: 1; }
        .target-info.bad  { color: var(--red-button); font-weight: 600; opacity: 1; }

        .unit-footer {
            display: flex;
            justify-content: flex-end;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid rgba(128,128,128,0.1);
        }
        .btn-delete-unit {
            background: none;
            border: 1px solid rgba(128,128,128,0.15);
            border-radius: 6px;
            color: var(--red-button);
            font-family: inherit;
            font-size: 0.82rem;
            padding: 6px 14px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-delete-unit:hover { background: var(--red-background); border-color: var(--red-button); }

        .btn-delete-asm {
            background: none; border: none;
            color: var(--red-button); font-size: 1rem;
            cursor: pointer; padding: 0 4px;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--text-color); opacity: 0.5;
        }
        .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }

        .material-symbols-outlined { font-size: 20px; line-height: 1; display: flex; align-items: center; }

    </style>
</head>

<script>

    // ── Clock ──
    function startClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    }
    setInterval(startClock, 1000);
    startClock();

    // ── Theme toggle ──
    let darkmode = localStorage.getItem('darkmode');
    const themeSwitch = document.getElementById('theme-switch');

    const enableDarkmode = () => {
        document.body.classList.add('darkmode');
        localStorage.setItem('darkmode', 'active');
    };
    const disableDarkmode = () => {
        document.body.classList.remove('darkmode');
        localStorage.setItem('darkmode', null);
    };

    if (darkmode === "active") enableDarkmode();

    themeSwitch.addEventListener("click", () => {
        darkmode = localStorage.getItem('darkmode');
        if (darkmode !== "active") enableDarkmode();
        else disableDarkmode();
    });

    // ── Grades logic ──
    const COLORS = ['#5c94e4','#e4855c','#5ce48e','#e4c85c','#a05ce4','#5cd4e4','#e45c9e','#8ee45c'];
    let units = [];
    let colorIdx = 0;

    function save() {
        try { localStorage.setItem('sp-grades-v1', JSON.stringify(units)); } catch(e) {}
    }
    function load() {
        try {
            const d = localStorage.getItem('sp-grades-v1');
            if (d) { units = JSON.parse(d); colorIdx = units.length % COLORS.length; }
        } catch(e) {}
        render();
    }

    // ── Unit management ──
    function addUnit() {
        const inp = document.getElementById('unit-name-input');
        const name = inp.value.trim();
        if (!name) { inp.focus(); return; }
        const cp = parseInt(document.getElementById('unit-cp-select').value);
        units.push({ id: Date.now(), name, cp, color: COLORS[colorIdx % COLORS.length], open: true, target: 75, assessments: [] });
        colorIdx++;
        inp.value = '';
        save();
        render();
    }

    document.getElementById('unit-name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') addUnit();
    });

    function deleteUnit(id) {
        if (!confirm('Remove this unit?')) return;
        units = units.filter(u => u.id !== id);
        save();
        render();
    }

    function toggleUnit(id) {
        const u = units.find(u => u.id === id);
        if (u) { u.open = !u.open; render(); }
    }

    // ── Assessment management ──
    function addAssessment(unitId) {
        const u = units.find(u => u.id === unitId);
        if (!u) return;
        u.assessments.push({ id: Date.now(), name: '', weight: '', grade: '' });
        save();
        render();
        setTimeout(() => {
            const inputs = document.querySelectorAll(`[data-unit="${unitId}"] .asm-name`);
            if (inputs.length) inputs[inputs.length - 1].focus();
        }, 30);
    }

    function deleteAssessment(unitId, asmId) {
        const u = units.find(u => u.id === unitId);
        if (!u) return;
        u.assessments = u.assessments.filter(a => a.id !== asmId);
        save();
        render();
    }

    function updateAssessment(unitId, asmId, field, value) {
        const u = units.find(u => u.id === unitId);
        if (!u) return;
        const a = u.assessments.find(a => a.id === asmId);
        if (!a) return;
        a[field] = value;
        save();
        refreshUnit(unitId);
    }

    function updateTarget(unitId, value) {
        const u = units.find(u => u.id === unitId);
        if (u) { u.target = parseFloat(value); save(); refreshUnit(unitId); }
    }

    // ── Calculations ──
    function calcUnit(u) {
        let weightedSum = 0, totalWeight = 0;
        for (const a of u.assessments) {
            const w = parseFloat(a.weight), g = parseFloat(a.grade);
            if (!isNaN(w) && w > 0) {
                totalWeight += w;
                if (!isNaN(g)) weightedSum += (g / 100) * w;
            }
        }
        const remaining = Math.max(0, 100 - totalWeight);
        const current = totalWeight > 0 ? (weightedSum / totalWeight) * 100 : null;
        return { weightedSum, totalWeight, remaining, current };
    }

    function gradeClass(v) {
        if (v === null) return '';
        if (v >= 85) return 'hd';
        if (v >= 75) return 'd';
        if (v >= 65) return 'cr';
        if (v >= 50) return 'p';
        return 'n';
    }

    function gradeLabel(v) {
        if (v === null) return '—';
        if (v >= 85) return 'HD';
        if (v >= 75) return 'D';
        if (v >= 65) return 'CR';
        if (v >= 50) return 'P';
        return 'N';
    }

    function overallWAM() {
        let totalCP = 0, sum = 0;
        for (const u of units) {
            const { current } = calcUnit(u);
            if (current !== null) { sum += current * u.cp; totalCP += u.cp; }
        }
        return totalCP > 0 ? sum / totalCP : null;
    }

    // ── Render ──
    function render() {
        const container = document.getElementById('units-container');

        if (!units.length) {
            container.innerHTML = `<div class="empty-state"><div class="emoji">📚</div><p>No units added yet. Add a unit above to start tracking!</p></div>`;
        } else {
            container.innerHTML = units.map(unitHTML).join('');
            attachListeners(container);
        }

        updateSummary();
    }

    function unitHTML(u) {
        const { weightedSum, totalWeight, remaining, current } = calcUnit(u);
        const gc = gradeClass(current);
        const pct = current !== null ? current.toFixed(1) + '%' : '—';
        const gl = gradeLabel(current);

        let targetHTML = '';
        if (remaining > 0 && totalWeight > 0) {
            const needed = ((u.target - weightedSum) / remaining) * 100;
            if (needed <= 0) targetHTML = `<span class="target-info good">Already on track ✓</span>`;
            else if (needed > 100) targetHTML = `<span class="target-info bad">Not achievable (need ${needed.toFixed(0)}%)</span>`;
            else targetHTML = `<span class="target-info">Need <strong>${needed.toFixed(1)}%</strong> avg on remaining ${remaining.toFixed(0)}%</span>`;
        } else if (!totalWeight) {
            targetHTML = `<span class="target-info">Add assessments to see</span>`;
        } else {
            targetHTML = `<span class="target-info good">All assessments entered</span>`;
        }

        const rows = u.assessments.map(a => {
            const w = parseFloat(a.weight), g = parseFloat(a.grade);
            const contrib = (!isNaN(w) && !isNaN(g) && w > 0) ? ((g / 100) * w).toFixed(1) : null;
            return `<tr>
                <td><input class="tbl-input asm-name" data-field="name" data-unitid="${u.id}" data-asmid="${a.id}" placeholder="Assessment name" value="${esc(a.name)}" /></td>
                <td style="width:100px"><input class="tbl-input" data-field="weight" data-unitid="${u.id}" data-asmid="${a.id}" placeholder="%" type="number" min="0" max="100" value="${esc(a.weight)}" /></td>
                <td style="width:100px"><input class="tbl-input" data-field="grade"  data-unitid="${u.id}" data-asmid="${a.id}" placeholder="%" type="number" min="0" max="100" value="${esc(a.grade)}" /></td>
                <td class="contrib-cell ${contrib !== null ? 'has-val' : ''}" style="width:70px">${contrib !== null ? contrib + '%' : '—'}</td>
                <td style="width:36px"><button class="btn-delete-asm" onclick="deleteAssessment(${u.id},${a.id})">✕</button></td>
            </tr>`;
        }).join('');

        return `
        <div class="unit-card" data-unit="${u.id}">
            <div class="unit-header" onclick="toggleUnit(${u.id})">
                <div class="unit-color-dot" style="background:${u.color}"></div>
                <span class="unit-header-name">${esc(u.name)}</span>
                <div class="unit-header-right">
                    <span class="unit-cp">${u.cp} cp</span>
                    <span class="grade-badge ${gc}">${pct} &nbsp; ${gl}</span>
                </div>
                <span class="chevron ${u.open ? 'open' : ''}">▼</span>
            </div>
            <div class="unit-body ${u.open ? 'open' : ''}">

                <div class="weight-bar-wrap">
                    <div class="weight-bar-meta">
                        <span>Weight entered: ${totalWeight.toFixed(0)}%</span>
                        <span>${remaining.toFixed(0)}% remaining</span>
                    </div>
                    <div class="weight-bar-track">
                        <div class="weight-bar-fill" style="width:${Math.min(totalWeight,100)}%"></div>
                    </div>
                </div>

                <table class="asm-table">
                    <thead>
                        <tr>
                            <th>Assessment</th>
                            <th>Weight %</th>
                            <th>Grade %</th>
                            <th style="text-align:right">Contribution</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>

                <button class="btn-add-asm" onclick="addAssessment(${u.id})">+ Add assessment</button>

                <div class="target-row">
                    <label>Target grade:</label>
                    <select onchange="updateTarget(${u.id}, this.value)">
                        <option value="85" ${u.target===85?'selected':''}>HD — 85%</option>
                        <option value="75" ${u.target===75?'selected':''}>D — 75%</option>
                        <option value="65" ${u.target===65?'selected':''}>CR — 65%</option>
                        <option value="50" ${u.target===50?'selected':''}>P — 50%</option>
                    </select>
                    ${targetHTML}
                </div>

                <div class="unit-footer">
                    <button class="btn-delete-unit" onclick="deleteUnit(${u.id})">Remove unit</button>
                </div>
            </div>
        </div>`;
    }

    function attachListeners(container) {
        container.querySelectorAll('[data-field]').forEach(el => {
            el.addEventListener('input', () => {
                updateAssessment(parseInt(el.dataset.unitid), parseInt(el.dataset.asmid), el.dataset.field, el.value);
            });
        });
    }

    function refreshUnit(unitId) {
        const u = units.find(u => u.id === unitId);
        if (!u) return;
        const card = document.querySelector(`[data-unit="${unitId}"]`);
        if (!card) return;
        const tmp = document.createElement('div');
        tmp.innerHTML = unitHTML(u);
        const newCard = tmp.firstElementChild;
        attachListeners(newCard);
        card.replaceWith(newCard);
        updateSummary();
    }

    function updateSummary() {
        const wam = overallWAM();
        document.getElementById('overall-wam').textContent = wam !== null ? wam.toFixed(1) + '%' : '—';
        document.getElementById('overall-grade').textContent = gradeLabel(wam);
        document.getElementById('unit-count').textContent = units.length;
    }

    function esc(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
</script>
</body>
</html>
