<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Planner - Login </title>

    <link rel="stylesheet" href=""> <!--FOR FONT -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

            <div class="container d-flex justify-content-center align-items-center min-vh-100 "> 
        <!-- Card container with padding, shadow, rounded corners -->
        <div class="p-4 shadow rounded custom-bg" style="width: 350px;"> 

            <div class="text-center mb-3">
            <!--<p>Hey students! <b>Planning</b> never gets easier</p> , need a good phrase-->  
                <h4>Create an account
                </h4>
            </div>

            <form id="signupForm" method="POST" action="{{url_for('main.signup')}}" novalidate>
                
                <div class="mb-3"> 
                    <input type="text" id="firstName" name="firstName" class="form-control" placeholder="First name" required>                  </div>
                <div class="mb-3"> 
                    <input type="text" id="lastName" name="lastName" class="form-control" placeholder="Last name" required>                   </div>
                <div class="mb-3"> 
                    <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>                   </div>
                <div class="mb-3">
                    <input type="date" name="dob" class="form-control" placeholder="dob" required>      </div>
                <!-- Email input field -->
                <div class="mb-3"> 
                    <input type="email" id="email" name="email" class="form-control" placeholder="username or email" required>
                </div>
                <!-- Password input field -->
                <div class="mb-3">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>                </div>
                <div class="mb-3">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter password" required>                </div>
                <!-- Submit button   -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </div>
                
                <!-- Navigation links for account actions -->
                <div class="text-center">
                    <a href="{{ url_for('main.login') }}" class="me-3">Log in</a>
                </div>

            </form>

        </div>
    </div>
    <p class="text-center text-muted position-absolute bottom-0 w-100 mb-3">
        By continuing, you acknowledge that you understand and agree to the Terms & Conditions and Privacy Policy
    </p>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
