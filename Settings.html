<!DOCTYPE html>
<html>
    <head>
        <title>Student Planner</title>
        <style>
            body{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                display: flex;
                min-height: 100vh; /*Makes background fill the whole screen */
                background-color: #f4f4f4;

            }
            .dashboard-welcome {font-size: 1.8rem; font-weight: 500; margin-top: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e0e0e0; color: #444;}

            .section-divider {border: none; border-top: 1px solid #e0e0e0; margin: 15px 0 20px 0;}

            /* Side Bar */

            .sidebar {
                width: 200px;
                background: linear-gradient(180deg, #5c94e4, #3b6fd8);
                border-top-right-radius: 20px;
                border-bottom-right-radius: 20px;
                color: white;
                padding: 25px 15px;
                display: flex;
                flex-direction: column;
                gap: 10px
            }

            .sidebar h2 {
                font-size: 1.1rem;
                margin-bottom: 20px;
                border-bottom: 1px solid #646464;
                padding-bottom: 10px;
                height: 20px;

            }

            .sidebar a {
                color: white;
                text-decoration: none;
                padding: 12px;
                border-radius: 6px;
                font-size: 1rem;
                transition: 0.2s;
                border: 1px solid rgba(255,255,255,0.3)
            }

            .sidebar a:hover { background-color: rgba(255,255,255,0.15);}
            
            .main-content {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .top-header {
                background: white;
                padding: 15px 30px;
                border-bottom: 1px solid #e0e0e0;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                height: 40px;
            }

            .logo-area {
                display: flex;
                flex-direction: column;

            }

            .logo-title {
                font-size: 2rem;
                font-weight: bold;
                color: white;
            }

            .welcome-msg {
                font-size: 1rem;
                color: white;
                margin-top: 2px;
            }

            .header {
                background: white;
                padding: 25px 15px;
                border-bottom: 1px solid #e0e0e0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .time-display {
                text-align: right;
                color: black;
                font-size: 0.9rem;
            }

            .content {
                padding: 40px;
            }

            table {
                border-collapse: collapse;
                border-radius: 5px;
                overflow: hidden;
                width: 50%;
            }

            th {
                background: #f1f3f6;
                padding: 14px;
                text-align: left;
                color: #444;
            }

            td {
                padding: 14px;
                border-bottom: 1px solid #eee;
            }

            tr:hover { background: #f9fbff;}

            .input-field {
                width: 100%;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                transition: 0.2s;
            }

            .input-field:focus {border-color: #5c94e4; outline: none ; box-shadow: 0 0 0 2px rgba(92,148,228,0.2)}

            .btn-add {
            margin-top: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #5c94e4, #3b6fd8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s ;
            }

            .btn-add:hover {transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15);}

            .card {background: white;border-radius: 12px;padding: 25px;margin-top: 15px;box-shadow: 0 4px 20px rgba(0,0,0,0.08);}

        .btn-delete {
            color: #d93025;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            }

        .status-dropdown {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        } 

        .status-not-started {
            background-color:   rgb(246, 190, 190);
            color: red;
        }

        .status-in-progress {
            background-color: rgb(249, 249, 13);
            color: rgb(204, 204, 25);
        }

        .status-completed {
            background-color: rgb(100, 255, 100);
            color: green;
        }

        </style>
    
     <body>
        <nav class="sidebar"> 
            <h2>Student Planner</h2>
            <a href="index.html">🏠 Dashboard</a>
            <a href="Units.html">📚My Units</a>
            <a href="PersonalToDoList.html">✅Personal To-Do List</a>
            <a href="Grades.html">📊Grades</a>
            <a href="Settings.html">⚙️ Settings</a>
            <a href="#">👥Invite a Friend</a>
         </nav>


        <div class="main-content">
            <header class="top-header">
                <div class="spacer"></div>
                <div class="time-display">
                    <div id="clock" style="font-weight: bold;">00:00:00</div>
                <div id="date">Loading...</div>
            </header>

            <div class="card">
                <h2>Settings</h2>

    <!-- Dark Mode -->
                <div class="settings-section">
                    <h3>Dark Mode</h3>
                    <label class="toggle">
                        <input type="checkbox">
                        <span>Enable Dark Mode</span>
                    </label>
                </div>

    <!-- User Info -->
                <div class="settings-section">
                    <h3>User Information</h3>

                    <input type="text" placeholder="Name" class="input-field">
                    <input type="email" placeholder="Email" class="input-field">
                    <input type="number" placeholder="Age" class="input-field">
                </div>

    <!-- Change Password -->
                <div class="settings-section">
                    <h3>Change Password</h3>

                    <input type="password" placeholder="Current Password" class="input-field">
                    <input type="password" placeholder="New Password" class="input-field">
                    <input type="password" placeholder="Confirm Password" class="input-field">
                </div>

    <!-- Timezone -->
                <div class="settings-section">
                    <h3>Timezone</h3>

                    <select id="timezone" class="input-field"></select>
                </div>

            </div>
        </div>
        
        </main>
    </div>


    <script>
        // 1. Clock and Date logic
        function startClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
        }
        setInterval(startClock, 1000);
        startClock();
        
        document.addEventListener("DOMContentLoaded", function () {
            const timezoneSelect = document.getElementById("timezone");

            const timezones = Intl.supportedValuesOf("timeZone");

            timezones.forEach(tz => {
                const option = document.createElement("option");
                option.value = tz;
                option.textContent = tz;
                timezoneSelect.appendChild(option);
            });
        });

        // 2. Add Status Colour
        function updateStatusColour(selectElement) {
            selectElement.classList.remove('status-not-started', 'status-in-progress', 'status-completed');

            const status = selectElement.value;
            if (status == "not-started") {
                selectElement.classList.add('status-not-started');
            } else if (status == "in-progress") {
                selectElement.classList.add('status-in-progress');
            } else if (status == "completed") {
                selectElement.classList.add('status-completed')
            }
        }

        // 3. Add Row 
        function addNewRow() {
            const tableBody = document.getElementById('unit-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="input-field" placeholder="Unit Code"></td>
                <td><input type="text" class="input-field" placeholder="Assignments"></td>
                <td>
                    <select class="status-dropdown status-not-started" onchange="updateStatusColour(this)">
                        <option value="not-started" selected>Not Started</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </td>
                <td><button class="btn-delete" onclick="removeRow(this)">&times;</button></td>
            `;
            tableBody.appendChild(row);
        }

        // 4. Delete Row 
        function removeRow(button) {
            button.closest('tr').remove();
        }

        document.addEventListener("change", function(e) {
            if (e.target.classList.contains("status-dropdown")) {
                updateStatusColour(e.target);}}
        );
    </script>
</body>
</html>
