
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Planner - Login </title>
    <link rel="stylesheet" href=""> <!--FOR FONT -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
        <div class="container d-flex justify-content-center align-items-center min-vh-100 "> 
        <!-- Card container with padding, shadow, rounded corners -->
        <div class="p-4 shadow rounded custom-bg" style="width: 350px;"> 

            <div class="text-center mb-3">
            <!--<p>Hey students! <b>Planning</b> never gets easier</p> , need a good phrase-->  
                <h4>Reset Password
                </h4>
            </div>

            <form id="resetForm" novalidate>
                <!-- Email input field -->
                <div class="mb-3"> 
                    <input type="email" id="email" name="email" class="form-control" placeholder="username or email" required>
                </div>
                <!-- Password input field -->
                <div class="mb-3">
                    <input type="password" id="newPassword"  name="new-password" class="form-control" placeholder="new password" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="confirmPassword"  name="confirm-new-password" class="form-control" placeholder="confirm password" required>
                </div>
                <div id="errorMessage" class="text-danger text-center mb-3 d-none"></div>
                <!-- Submit button   -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Reset</button>
                </div>

                <!-- Navigation links for account actions -->
                <div class="text-center">
                    <a href="login.html" class="me-3">Log in</a>
                    <a href="signup.html" class="me-3">Sign Up</a>
                </div>

            </form>
        </div>
    </div>
    <p class="text-center text-muted position-absolute bottom-0 w-100 mb-3">
        By continuing, you acknowledge that you understand and agree to the Terms & Conditions and Privacy Policy
    </p>
    <script src="auth.js"></script>
</body>
</html>
